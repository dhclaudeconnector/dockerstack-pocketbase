# ================================================================
#  compose.apps.yml — Application Layer
#  App: PocketBase (BaaS) + Litestream (SQLite → S3 replication)
#
#  Subdomain: ${PROJECT_NAME}.${DOMAIN}
#
#  Minimal required env:
#    APP_PORT, PROJECT_NAME, DOMAIN
#    LITESTREAM_S3_ENDPOINT, LITESTREAM_S3_BUCKET,
#    LITESTREAM_S3_ACCESS_KEY_ID, LITESTREAM_S3_SECRET_ACCESS_KEY
#
#  Startup behavior:
#    - Normal: restore data.db từ S3 trước → exit 1 nếu không có backup
#    - Init:   LITESTREAM_INIT_MODE=true → bỏ qua restore, tạo DB mới
#              Truy cập /_/ để setup admin → dừng → tắt INIT_MODE
#
#  PocketBase URLs:
#    Admin UI  : http(s)://<domain>/_/
#    API       : http(s)://<domain>/api/
#    Health    : http(s)://<domain>/api/health
# ================================================================

services:
  app:
    image: "${PROJECT_NAME:-myapp}-app:local"
    build:
      context: ./services/app
      dockerfile: Dockerfile
      args:
        PB_VERSION: "${PB_VERSION:-0.37.1}"
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      # ── PocketBase runtime ──────────────────────────────────────
      DATA_DIR: "/pb/pb_data"
      NODE_ENV: "${NODE_ENV:-production}"
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-ongtrieuhau861@gmail.com}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}

      # ── Litestream / S3 ─────────────────────────────────────────
      # Init mode: true  = bỏ qua restore, tạo data mới (lần đầu tiên)
      #            false = bắt buộc restore từ S3, exit 1 nếu không có
      LITESTREAM_INIT_MODE: "${LITESTREAM_INIT_MODE:-false}"
      LITESTREAM_S3_ENDPOINT: "${LITESTREAM_S3_ENDPOINT}"
      LITESTREAM_S3_BUCKET: "${LITESTREAM_S3_BUCKET}"
      LITESTREAM_S3_PATH: "${LITESTREAM_S3_PATH:-pocketbase/data.db}"
      LITESTREAM_S3_ACCESS_KEY_ID: "${LITESTREAM_S3_ACCESS_KEY_ID}"
      LITESTREAM_S3_SECRET_ACCESS_KEY: "${LITESTREAM_S3_SECRET_ACCESS_KEY}"

    command:
      - "./pocketbase"
      - "serve"
      - "--http=0.0.0.0:${APP_PORT:-8090}"
      - "--dir=/pb/pb_data"

    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8090}:${APP_PORT:-8090}"

    volumes:
      # pb_data chứa data.db, logs.db, storage (file uploads), migrations
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/app/pb_data:/pb/pb_data

    networks: [app_net]
    restart: unless-stopped

    # Litestream cần ~30-40s để flush WAL cuối cùng lên S3 trước khi tắt
    stop_grace_period: 40s

    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "wget -qO- http://localhost:${APP_PORT:-8090}/api/health || exit 1"
      # ── Tối ưu hoá startup time ─────────────────────────────────
      # Giảm start_period từ 30s → 10s: S3 restore nhỏ (<5MB) hoàn thành
      # trong 1–5s, PocketBase ready rất nhanh sau đó.
      # Giảm interval từ 30s → 5s: phát hiện healthy ngay sau start_period.
      # Tăng retries lên 6 (=30s window sau start_period) để an toàn cho
      # trường hợp DB lớn hoặc S3 chậm.
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 6

  consul-gateway:
    image: "${PROJECT_NAME:-myapp}-consul-gateway:local"
    build:
      context: .
      dockerfile: services/consul-gateway/Dockerfile
    env_file:
      - ./.env
    environment:
      CONSUL_GATEWAY_PORT: "${CONSUL_GATEWAY_PORT:-18090}"
      CONSUL_UPSTREAM_URL: "http://app:${APP_PORT:-8090}"
      CONSUL_FIREBASE_ENABLE: "${CONSUL_FIREBASE_ENABLE:-false}"
      CONSUL_FIREBASE_URL: "${CONSUL_FIREBASE_URL:-}"
      CONSUL_NODE_ID: "${CONSUL_NODE_ID:-${PROJECT_NAME:-myapp}-${HOSTNAME:-node}}"
      CONSUL_LEASE_TTL_MS: "${CONSUL_LEASE_TTL_MS:-70000}"
      CONSUL_LEASE_RENEW_MS: "${CONSUL_LEASE_RENEW_MS:-15000}"
      CONSUL_LEASE_POLL_MS: "${CONSUL_LEASE_POLL_MS:-10000}"
      CONSUL_FIREBASE_SSE_ENABLE: "${CONSUL_FIREBASE_SSE_ENABLE:-true}"
      CONSUL_LOST_LEASE_EXIT: "${CONSUL_LOST_LEASE_EXIT:-false}"
      CONSUL_STANDBY_ALLOW_API_READONLY: "${CONSUL_STANDBY_ALLOW_API_READONLY:-true}"
      CONSUL_TAKEOVER_ON_JOIN: "${CONSUL_TAKEOVER_ON_JOIN:-false}"
    labels:
      # Public HTTP via Cloudflare Tunnel
      - "caddy=http://${PROJECT_NAME}.${DOMAIN}, http://main.${DOMAIN}, http://${DOMAIN}, http://${PROJECT_NAME_TAILSCALE}.${TAILSCALE_TAILNET_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams ${CONSUL_GATEWAY_PORT:-18090}}}"
      # Internal HTTPS via Tailscale
      - "caddy_1=https://${PROJECT_NAME_TAILSCALE:-myapp}.${TAILSCALE_TAILNET_DOMAIN:-tailnet.local}"
      - "caddy_1.tls=internal"
      - "caddy_1.reverse_proxy={{upstreams ${CONSUL_GATEWAY_PORT:-18090}}}"
    networks: [app_net]
    restart: unless-stopped
    # ── Thay đổi quan trọng: service_started thay vì service_healthy ──
    # Trước: consul-gateway phải đợi app healthy (~60–90s) mới khởi động.
    # Sau:   consul-gateway khởi động ngay khi app container bắt đầu chạy
    #        (~2–3s). Trong lúc app đang restore S3, gateway trả 502 cho
    #        các request đến — chấp nhận được vì app sẽ sẵn sàng sau ~15s.
    #        Lease manager chạy độc lập, không phụ thuộc app upstream.
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-qO-"
        - "http://localhost:${CONSUL_GATEWAY_PORT:-18090}/__consul/status"
      # Giảm start_period từ 10s → 5s (Node.js khởi động < 1s)
      # Giảm interval từ 30s → 10s
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3
